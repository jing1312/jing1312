<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="800" height="150">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0015"/>
      <stop offset="30%" style="stop-color:#1a0533"/>
      <stop offset="70%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#0a0015"/>
    </linearGradient>
    
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,200,0.8)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,200,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,200,0)"/>
    </radialGradient>
    
    <style>
      @keyframes twinkle {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      
      @keyframes moon-glow {
        0%, 100% { filter: drop-shadow(0 0 10px rgba(255,255,200,0.3)); }
        50% { filter: drop-shadow(0 0 25px rgba(255,255,200,0.8)); }
      }
      
      @keyframes shooting-star {
        0% { transform: translate(0, 0); opacity: 0; }
        10% { opacity: 1; }
        70% { opacity: 1; }
        100% { transform: translate(300px, 150px); opacity: 0; }
      }
      
      @keyframes cloud-drift {
        0% { transform: translateX(-100px); }
        100% { transform: translateX(900px); }
      }
      
      .star {
        animation: twinkle ease-in-out infinite;
      }
      
      .moon {
        animation: moon-glow ease-in-out infinite;
      }
      
      .shooting-star {
        animation: shooting-star linear infinite;
      }
      
      .cloud {
        animation: cloud-drift linear infinite;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="150" fill="url(#sky)"/>
  
  <!-- Stars -->
  <polygon points="50,30 53,40 63,40 55,46 58,56 50,50 42,56 45,46 37,40 47,40" fill="#ffd700" class="star" style="animation-duration: 2s; animation-delay: 0s;"/>
  <polygon points="150,50 153,60 163,60 155,66 158,76 150,70 142,76 145,66 137,60 147,60" fill="#ffffff" class="star" style="animation-duration: 1.5s; animation-delay: 0.5s;"/>
  <polygon points="250,25 253,35 263,35 255,41 258,51 250,45 242,51 245,41 237,35 247,35" fill="#ffd700" class="star" style="animation-duration: 2.5s; animation-delay: 1s;"/>
  <polygon points="350,45 353,55 363,55 355,61 358,71 350,65 342,71 345,61 337,55 347,55" fill="#ffffff" class="star" style="animation-duration: 1.8s; animation-delay: 0.3s;"/>
  <polygon points="450,70 453,80 463,80 455,86 458,96 450,90 442,96 445,86 437,80 447,80" fill="#ffd700" class="star" style="animation-duration: 2.2s; animation-delay: 1.5s;"/>
  <polygon points="550,35 553,45 563,45 555,51 558,61 550,55 542,61 545,51 537,45 547,45" fill="#ffffff" class="star" style="animation-duration: 1.7s; animation-delay: 0.8s;"/>
  <polygon points="650,55 653,65 663,65 655,71 658,81 650,75 642,81 645,71 637,65 647,65" fill="#ffd700" class="star" style="animation-duration: 2.1s; animation-delay: 0.2s;"/>
  <polygon points="750,30 753,40 763,40 755,46 758,56 750,50 742,56 745,46 737,40 747,40" fill="#ffffff" class="star" style="animation-duration: 1.9s; animation-delay: 1.2s;"/>
  
  <!-- Moon -->
  <circle cx="700" cy="80" r="35" fill="#fffde7" class="moon"/>
  <circle cx="700" cy="80" r="50" fill="url(#moonGlow)" opacity="0.3"/>
  <circle cx="690" cy="70" r="8" fill="#0a0015" opacity="0.3"/>
  <circle cx="710" cy="85" r="5" fill="#0a0015" opacity="0.2"/>
  
  <!-- Shooting stars -->
  <line x1="100" y1="50" x2="130" y2="55" stroke="#ffffff" stroke-width="2" stroke-linecap="round" class="shooting-star" style="animation-duration: 3s; animation-delay: 0s;"/>
  <line x1="400" y1="80" x2="430" y2="85" stroke="#ffb6c1" stroke-width="2" stroke-linecap="round" class="shooting-star" style="animation-duration: 4s; animation-delay: 2s;"/>
  <line x1="600" y1="30" x2="630" y2="35" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" class="shooting-star" style="animation-duration: 3.5s; animation-delay: 1s;"/>
  
  <!-- Clouds -->
  <g class="cloud" style="animation-duration: 25s; animation-delay: 0s;">
    <ellipse cx="100" cy="120" rx="60" ry="20" fill="rgba(255,255,255,0.1)"/>
    <ellipse cx="130" cy="110" rx="40" ry="15" fill="rgba(255,255,255,0.08)"/>
    <ellipse cx="80" cy="115" rx="35" ry="12" fill="rgba(255,255,255,0.06)"/>
  </g>
  <g class="cloud" style="animation-duration: 30s; animation-delay: 5s;">
    <ellipse cx="500" cy="140" rx="70" ry="22" fill="rgba(255,182,193,0.08)"/>
    <ellipse cx="530" cy="130" rx="45" ry="16" fill="rgba(255,182,193,0.06)"/>
    <ellipse cx="480" cy="135" rx="40" ry="14" fill="rgba(255,182,193,0.05)"/>
  </g>
  <g class="cloud" style="animation-duration: 28s; animation-delay: 10s;">
    <ellipse cx="750" cy="160" rx="55" ry="18" fill="rgba(168,85,247,0.08)"/>
    <ellipse cx="770" cy="150" rx="35" ry="12" fill="rgba(168,85,247,0.06)"/>
  </g>
</svg>
