<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="islandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b3fa0"/>
      <stop offset="50%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#1a0533"/>
    </linearGradient>
    
    <linearGradient id="waterfall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(200,220,255,0.6)"/>
      <stop offset="50%" style="stop-color:rgba(150,180,255,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(100,140,255,0.2)"/>
    </linearGradient>
    
    <linearGradient id="castleGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    
    <linearGradient id="balloonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
    
    <linearGradient id="balloonGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1"/>
      <stop offset="100%" style="stop-color:#fbc2eb"/>
    </linearGradient>
    
    <radialGradient id="firefly" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,100,0.9)"/>
      <stop offset="50%" style="stop-color:rgba(200,255,100,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(200,255,100,0)"/>
    </radialGradient>
    
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="100%" style="stop-color:#ff69b4"/>
    </linearGradient>
    
    <style>
      @keyframes cloud-drift-right {
        0% { transform: translateX(-150px); }
        100% { transform: translateX(950px); }
      }
      
      @keyframes cloud-drift-left {
        0% { transform: translateX(950px); }
        100% { transform: translateX(-150px); }
      }
      
      @keyframes float-around {
        0% { transform: translate(0, 0); opacity: 0.6; }
        25% { transform: translate(30px, -20px); opacity: 0.9; }
        50% { transform: translate(-20px, 10px); opacity: 0.5; }
        75% { transform: translate(15px, 25px); opacity: 0.8; }
        100% { transform: translate(0, 0); opacity: 0.6; }
      }
      
      @keyframes heart-float {
        0% { transform: translateY(0) scale(0.8); opacity: 0.8; }
        50% { transform: translateY(-30px) scale(1); opacity: 0.6; }
        100% { transform: translateY(-60px) scale(0.8); opacity: 0; }
      }
      
      @keyframes note-float {
        0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
        50% { transform: translateY(-80px) rotate(15deg); opacity: 0.6; }
        100% { transform: translateY(-160px) rotate(-10deg); opacity: 0; }
      }
      
      @keyframes firefly-glow {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        25% { opacity: 0.9; transform: scale(1.2); }
        50% { opacity: 0.3; transform: scale(0.9); }
        75% { opacity: 1; transform: scale(1.3); }
      }
      
      @keyframes balloon-float {
        0% { transform: translateY(10px) translateX(0); }
        25% { transform: translateY(-15px) translateX(10px); }
        50% { transform: translateY(5px) translateX(-5px); }
        75% { transform: translateY(-10px) translateX(8px); }
        100% { transform: translateY(10px) translateX(0); }
      }
      
      @keyframes waterfall-flow {
        0% { transform: translateY(0); opacity: 0.6; }
        50% { transform: translateY(20px); opacity: 0.4; }
        100% { transform: translateY(40px); opacity: 0.2; }
      }
      
      @keyframes fall-down {
        0% { transform: translateY(-30px) rotate(0deg) scale(0.8); opacity: 0; }
        10% { opacity: 0.9; }
        90% { opacity: 0.7; }
        100% { transform: translateY(430px) rotate(360deg) scale(0.6); opacity: 0; }
      }
      
      .cloud-right {
        animation: cloud-drift-right linear infinite;
      }
      
      .cloud-left {
        animation: cloud-drift-left linear infinite;
      }
      
      .sparkle {
        animation: float-around ease-in-out infinite;
      }
      
      .heart {
        animation: heart-float ease-in-out infinite;
      }
      
      .note {
        animation: note-float ease-in-out infinite;
      }
      
      .firefly {
        animation: firefly-glow ease-in-out infinite;
      }
      
      .balloon {
        animation: balloon-float ease-in-out infinite;
      }
      
      .waterfall {
        animation: waterfall-flow linear infinite;
      }
      
      .petal {
        animation: fall-down linear infinite;
      }
    </style>
  </defs>
  
  <!-- Transparent background -->
  <rect width="800" height="400" fill="none"/>
  
  <!-- Background clouds (behind island) -->
  <g class="cloud-right" style="animation-duration: 35s; animation-delay: 0s;">
    <ellipse cx="100" cy="200" rx="80" ry="25" fill="rgba(255,255,255,0.08)"/>
    <ellipse cx="140" cy="190" rx="50" ry="18" fill="rgba(255,255,255,0.06)"/>
    <ellipse cx="70" cy="195" rx="45" ry="15" fill="rgba(255,255,255,0.05)"/>
  </g>
  
  <g class="cloud-left" style="animation-duration: 40s; animation-delay: 5s;">
    <ellipse cx="700" cy="180" rx="90" ry="28" fill="rgba(255,182,193,0.06)"/>
    <ellipse cx="740" cy="170" rx="55" ry="20" fill="rgba(255,182,193,0.05)"/>
    <ellipse cx="670" cy="175" rx="50" ry="18" fill="rgba(255,182,193,0.04)"/>
  </g>
  
  <g class="cloud-right" style="animation-duration: 30s; animation-delay: 10s;">
    <ellipse cx="400" cy="150" rx="70" ry="22" fill="rgba(168,85,247,0.06)"/>
    <ellipse cx="430" cy="140" rx="45" ry="16" fill="rgba(168,85,247,0.05)"/>
  </g>
  
  <!-- Main island (floating rock shape) -->
  <path d="M150,280 
           C180,250 220,230 260,240 
           C300,250 330,220 370,210 
           C410,200 440,210 470,220 
           C500,230 530,210 560,220 
           C590,230 620,240 650,260 
           C680,280 700,290 720,310 
           L720,350 
           C700,345 660,340 620,345 
           C580,350 540,345 500,350 
           C460,355 420,350 380,355 
           C340,360 300,355 260,360 
           C220,365 180,360 150,350 
           L150,280 Z" 
        fill="url(#islandGrad)" 
        stroke="rgba(168,85,247,0.3)" 
        stroke-width="2"/>
  
  <!-- Island bottom (hanging rocks) -->
  <path d="M180,350 
           C200,370 230,390 260,400 
           C290,410 310,420 340,425 
           C370,430 390,435 420,430 
           C450,425 470,420 500,410 
           C530,400 550,390 580,380 
           C610,370 630,360 650,350 
           L720,350 
           C700,360 660,380 620,400 
           C580,420 540,435 500,445 
           C460,455 420,460 380,455 
           C340,450 300,440 260,425 
           C220,410 190,390 180,370 
           L180,350 Z" 
        fill="#1a0533" 
        opacity="0.6"/>
  
  <!-- Waterfall -->
  <g class="waterfall" style="animation-duration: 2s; animation-delay: 0s;">
    <path d="M380,355 Q385,370 390,385 Q395,400 388,420 Q382,440 385,460" 
          stroke="url(#waterfall)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M390,355 Q395,375 400,395 Q405,415 398,435 Q392,455 395,475" 
          stroke="url(#waterfall)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.4"/>
    <path d="M400,355 Q405,370 410,385 Q415,400 408,420 Q402,440 405,460" 
          stroke="url(#waterfall)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.3"/>
  </g>
  
  <g class="waterfall" style="animation-duration: 2.5s; animation-delay: 0.5s;">
    <path d="M385,360 Q390,380 395,400 Q400,420 393,440 Q387,460 390,480" 
          stroke="rgba(200,220,255,0.3)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Castle -->
  <g opacity="0.7">
    <!-- Main tower -->
    <rect x="380" y="180" width="40" height="100" fill="url(#castleGrad)" rx="2"/>
    <polygon points="380,180 400,155 420,180" fill="#2d1b69"/>
    <line x1="400" y1="155" x2="400" y2="140" stroke="#ff69b4" stroke-width="2"/>
    <polygon points="400,140 415,145 400,150" fill="#ff69b4"/>
    
    <!-- Left tower -->
    <rect x="340" y="200" width="30" height="80" fill="url(#castleGrad)" rx="2"/>
    <polygon points="340,200 355,180 370,200" fill="#2d1b69"/>
    <line x1="355" y1="180" x2="355" y2="165" stroke="#ff69b4" stroke-width="2"/>
    <polygon points="355,165 370,170 355,175" fill="#ff69b4"/>
    
    <!-- Right tower -->
    <rect x="430" y="200" width="30" height="80" fill="url(#castleGrad)" rx="2"/>
    <polygon points="430,200 445,180 460,200" fill="#2d1b69"/>
    <line x1="445" y1="180" x2="445" y2="165" stroke="#ff69b4" stroke-width="2"/>
    <polygon points="445,165 460,170 445,175" fill="#ff69b4"/>
    
    <!-- Castle body -->
    <rect x="350" y="260" width="100" height="20" fill="url(#castleGrad)" rx="2"/>
    
    <!-- Windows -->
    <rect x="390" y="210" width="15" height="20" fill="#1a0533" rx="7 7 0 0"/>
    <rect x="350" y="220" width="12" height="15" fill="#1a0533" rx="6 6 0 0"/>
    <rect x="440" y="220" width="12" height="15" fill="#1a0533" rx="6 6 0 0"/>
    
    <!-- Door -->
    <rect x="385" y="265" width="30" height="15" fill="#1a0533" rx="15 15 0 0"/>
  </g>
  
  <!-- Hot air balloons -->
  <g class="balloon" style="animation-duration: 8s; animation-delay: 0s;">
    <ellipse cx="200" cy="120" rx="25" ry="30" fill="url(#balloonGrad)" opacity="0.8"/>
    <line x1="190" y1="150" x2="195" y2="170" stroke="#ffb6c1" stroke-width="1"/>
    <line x1="210" y1="150" x2="205" y2="170" stroke="#ffb6c1" stroke-width="1"/>
    <rect x="190" y="170" width="20" height="12" fill="#ffb6c1" rx="2" opacity="0.7"/>
    <line x1="190" y1="176" x2="210" y2="176" stroke="#ff69b4" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <g class="balloon" style="animation-duration: 10s; animation-delay: 3s;">
    <ellipse cx="600" cy="100" rx="22" ry="27" fill="url(#balloonGrad2)" opacity="0.7"/>
    <line x1="590" y1="127" x2="594" y2="145" stroke="#a18cd1" stroke-width="1"/>
    <line x1="610" y1="127" x2="606" y2="145" stroke="#a18cd1" stroke-width="1"/>
    <rect x="590" y="145" width="18" height="10" fill="#a18cd1" rx="2" opacity="0.6"/>
  </g>
  
  <!-- Hearts -->
  <path d="M250,200 C250,190 260,185 265,195 C270,185 280,190 280,200 C280,210 265,220 265,220 C265,220 250,210 250,200Z" 
        fill="url(#heartGrad)" class="heart" style="animation-duration: 6s; animation-delay: 0s;"/>
  <path d="M520,180 C520,170 530,165 535,175 C540,165 550,170 550,180 C550,190 535,200 535,200 C535,200 520,190 520,180Z" 
        fill="#ff69b4" class="heart" style="animation-duration: 5s; animation-delay: 1s;"/>
  
  <!-- Music notes -->
  <g class="note" style="animation-duration: 4s; animation-delay: 0s;">
    <circle cx="450" cy="150" r="5" fill="#ffd700" opacity="0.7"/>
    <line x1="455" y1="150" x2="455" y2="130" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
    <path d="M455,130 Q465,125 462,133" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
  </g>
  
  <g class="note" style="animation-duration: 5s; animation-delay: 1.5s;">
    <circle cx="320" cy="170" r="4" fill="#ff69b4" opacity="0.6"/>
    <line x1="324" y1="170" x2="324" y2="155" stroke="#ff69b4" stroke-width="1.5" opacity="0.6"/>
    <path d="M324,155 Q332,150 330,157" fill="none" stroke="#ff69b4" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Fireflies -->
  <circle cx="280" cy="230" r="4" fill="url(#firefly)" class="firefly" style="animation-duration: 3s; animation-delay: 0s;"/>
  <circle cx="400" cy="210" r="3" fill="url(#firefly)" class="firefly" style="animation-duration: 2.5s; animation-delay: 0.5s;"/>
  <circle cx="500" cy="240" r="4" fill="url(#firefly)" class="firefly" style="animation-duration: 3.5s; animation-delay: 1s;"/>
  <circle cx="350" cy="250" r="3" fill="url(#firefly)" class="firefly" style="animation-duration: 2.8s; animation-delay: 1.5s;"/>
  <circle cx="450" cy="260" r="4" fill="url(#firefly)" class="firefly" style="animation-duration: 3.2s; animation-delay: 0.3s;"/>
  
  <!-- Sparkles -->
  <circle cx="250" cy="180" r="3" fill="rgba(168,85,247,0.5)" class="sparkle" style="animation-duration: 5s; animation-delay: 0s;"/>
  <circle cx="500" cy="190" r="4" fill="rgba(255,182,193,0.5)" class="sparkle" style="animation-duration: 6s; animation-delay: 1s;"/>
  <circle cx="350" cy="200" r="3" fill="rgba(168,85,247,0.5)" class="sparkle" style="animation-duration: 4s; animation-delay: 2s;"/>
  <circle cx="600" cy="170" r="5" fill="rgba(255,182,193,0.5)" class="sparkle" style="animation-duration: 7s; animation-delay: 0.5s;"/>
  
  <!-- Petals -->
  <ellipse cx="200" cy="0" rx="8" ry="12" fill="#ffb6c1" opacity="0.8" class="petal" style="animation-duration: 8s; animation-delay: 0s;" transform="rotate(30, 200, 0)"/>
  <ellipse cx="350" cy="0" rx="10" ry="14" fill="#ff69b4" opacity="0.7" class="petal" style="animation-duration: 10s; animation-delay: 2s;" transform="rotate(-20, 350, 0)"/>
  <ellipse cx="500" cy="0" rx="7" ry="11" fill="#ffc0cb" opacity="0.9" class="petal" style="animation-duration: 9s; animation-delay: 1s;" transform="rotate(45, 500, 0)"/>
  <ellipse cx="650" cy="0" rx="9" ry="13" fill="#ffb6c1" opacity="0.6" class="petal" style="animation-duration: 11s; animation-delay: 3s;" transform="rotate(-35, 650, 0)"/>
  
  <!-- Foreground clouds -->
  <g class="cloud-right" style="animation-duration: 25s; animation-delay: 2s;">
    <ellipse cx="50" cy="320" rx="70" ry="22" fill="rgba(255,255,255,0.1)"/>
    <ellipse cx="80" cy="310" rx="45" ry="16" fill="rgba(255,255,255,0.08)"/>
  </g>
  
  <g class="cloud-left" style="animation-duration: 28s; animation-delay: 7s;">
    <ellipse cx="750" cy="300" rx="80" ry="25" fill="rgba(255,182,193,0.08)"/>
    <ellipse cx="780" cy="290" rx="50" ry="18" fill="rgba(255,182,193,0.06)"/>
  </g>
</svg>
