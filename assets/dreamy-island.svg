<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <defs>
    <linearGradient id="islandBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="50%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#1a0533"/>
    </linearGradient>
    
    <radialGradient id="bubble" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,182,193,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(135,206,235,0.2)"/>
    </radialGradient>
    
    <radialGradient id="firefly" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,100,0.9)"/>
      <stop offset="50%" style="stop-color:rgba(200,255,100,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(200,255,100,0)"/>
    </radialGradient>
    
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="100%" style="stop-color:#ff69b4"/>
    </linearGradient>
    
    <linearGradient id="balloonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
    
    <linearGradient id="balloonGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1"/>
      <stop offset="100%" style="stop-color:#fbc2eb"/>
    </linearGradient>
    
    <linearGradient id="castleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b69;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1a0533;stop-opacity:0.8"/>
    </linearGradient>
    
    <style>
      @keyframes float-up {
        0% { transform: translateY(250px) scale(0.5); opacity: 0; }
        10% { opacity: 0.8; }
        90% { opacity: 0.6; }
        100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
      }
      
      @keyframes fall-down {
        0% { transform: translateY(-30px) rotate(0deg) scale(0.8); opacity: 0; }
        10% { opacity: 0.9; }
        90% { opacity: 0.7; }
        100% { transform: translateY(280px) rotate(360deg) scale(0.6); opacity: 0; }
      }
      
      @keyframes float-around {
        0% { transform: translate(0, 0); opacity: 0.6; }
        25% { transform: translate(30px, -20px); opacity: 0.9; }
        50% { transform: translate(-20px, 10px); opacity: 0.5; }
        75% { transform: translate(15px, 25px); opacity: 0.8; }
        100% { transform: translate(0, 0); opacity: 0.6; }
      }
      
      @keyframes heart-float {
        0% { transform: translateY(250px) scale(0.3); opacity: 0; }
        10% { opacity: 0.8; }
        90% { opacity: 0.5; }
        100% { transform: translateY(-50px) scale(1); opacity: 0; }
      }
      
      @keyframes note-float {
        0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
        50% { transform: translateY(-100px) rotate(15deg); opacity: 0.6; }
        100% { transform: translateY(-200px) rotate(-10deg); opacity: 0; }
      }
      
      @keyframes firefly-glow {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        25% { opacity: 0.9; transform: scale(1.2); }
        50% { opacity: 0.3; transform: scale(0.9); }
        75% { opacity: 1; transform: scale(1.3); }
      }
      
      @keyframes balloon-float {
        0% { transform: translateY(10px) translateX(0); }
        25% { transform: translateY(-15px) translateX(10px); }
        50% { transform: translateY(5px) translateX(-5px); }
        75% { transform: translateY(-10px) translateX(8px); }
        100% { transform: translateY(10px) translateX(0); }
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.5); opacity: 0.9; }
      }
      
      .bubble {
        animation: float-up linear infinite;
      }
      
      .petal {
        animation: fall-down linear infinite;
      }
      
      .sparkle {
        animation: float-around ease-in-out infinite;
      }
      
      .heart {
        animation: heart-float linear infinite;
      }
      
      .note {
        animation: note-float ease-in-out infinite;
      }
      
      .firefly {
        animation: firefly-glow ease-in-out infinite;
      }
      
      .balloon {
        animation: balloon-float ease-in-out infinite;
      }
      
      .light {
        animation: pulse ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="250" fill="url(#islandBg)"/>
  
  <!-- Ground hills (island shape) -->
  <ellipse cx="200" cy="250" rx="250" ry="60" fill="#1a0533" opacity="0.5"/>
  <ellipse cx="600" cy="250" rx="300" ry="70" fill="#0a0015" opacity="0.4"/>
  <ellipse cx="400" cy="250" rx="200" ry="50" fill="#2d1b69" opacity="0.3"/>
  
  <!-- Castle silhouette -->
  <g opacity="0.4">
    <rect x="300" y="170" width="200" height="80" fill="url(#castleGrad)" rx="2"/>
    <rect x="310" y="150" width="25" height="100" fill="url(#castleGrad)" rx="1"/>
    <rect x="465" y="150" width="25" height="100" fill="url(#castleGrad)" rx="1"/>
    <polygon points="310,150 322.5,130 335,150" fill="url(#castleGrad)"/>
    <polygon points="465,150 477.5,130 490,150" fill="url(#castleGrad)"/>
    <rect x="370" y="200" width="60" height="50" fill="#1a0533" rx="30 30 0 0"/>
    <rect x="330" y="180" width="20" height="30" fill="#1a0533" rx="2"/>
    <rect x="450" y="180" width="20" height="30" fill="#1a0533" rx="2"/>
    <!-- Tower flags -->
    <line x1="322.5" y1="130" x2="322.5" y2="115" stroke="#ff69b4" stroke-width="2"/>
    <polygon points="322.5,115 335,120 322.5,125" fill="#ff69b4"/>
    <line x1="477.5" y1="130" x2="477.5" y2="115" stroke="#ff69b4" stroke-width="2"/>
    <polygon points="477.5,115 490,120 477.5,125" fill="#ff69b4"/>
  </g>
  
  <!-- Hot air balloons -->
  <g class="balloon" style="animation-duration: 8s; animation-delay: 0s;">
    <ellipse cx="150" cy="50" rx="25" ry="30" fill="url(#balloonGrad)" opacity="0.8"/>
    <line x1="140" y1="80" x2="145" y2="100" stroke="#ffb6c1" stroke-width="1"/>
    <line x1="160" y1="80" x2="155" y2="100" stroke="#ffb6c1" stroke-width="1"/>
    <rect x="140" y="100" width="20" height="12" fill="#ffb6c1" rx="2" opacity="0.7"/>
    <line x1="140" y1="106" x2="160" y2="106" stroke="#ff69b4" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <g class="balloon" style="animation-duration: 10s; animation-delay: 3s;">
    <ellipse cx="650" cy="70" rx="22" ry="27" fill="url(#balloonGrad2)" opacity="0.7"/>
    <line x1="640" y1="97" x2="644" y2="115" stroke="#a18cd1" stroke-width="1"/>
    <line x1="660" y1="97" x2="656" y2="115" stroke="#a18cd1" stroke-width="1"/>
    <rect x="640" y="115" width="18" height="10" fill="#a18cd1" rx="2" opacity="0.6"/>
  </g>
  
  <!-- Hearts -->
  <path d="M10,35 C10,25 20,20 25,30 C30,20 40,25 40,35 C40,45 25,55 25,55 C25,55 10,45 10,35Z" fill="url(#heartGrad)" class="heart" style="animation-duration: 6s; animation-delay: 0s; transform-origin: 25px 40px;"/>
  <path d="M570,170 C570,160 580,155 585,165 C590,155 600,160 600,170 C600,180 585,190 585,190 C585,190 570,180 570,170Z" fill="url(#heartGrad)" class="heart" style="animation-duration: 7s; animation-delay: 2s; transform-origin: 585px 175px;"/>
  <path d="M720,100 C720,90 730,85 735,95 C740,85 750,90 750,100 C750,110 735,120 735,120 C735,120 720,110 720,100Z" fill="#ff69b4" class="heart" style="animation-duration: 5s; animation-delay: 1s; transform-origin: 735px 105px;"/>
  
  <!-- Music notes -->
  <g class="note" style="animation-duration: 4s; animation-delay: 0s;">
    <circle cx="400" cy="130" r="6" fill="#ffd700" opacity="0.7"/>
    <line x1="406" y1="130" x2="406" y2="105" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
    <path d="M406,105 Q420,100 415,110" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
  </g>
  
  <g class="note" style="animation-duration: 5s; animation-delay: 1.5s;">
    <circle cx="250" cy="150" r="5" fill="#ff69b4" opacity="0.6"/>
    <line x1="255" y1="150" x2="255" y2="130" stroke="#ff69b4" stroke-width="1.5" opacity="0.6"/>
    <path d="M255,130 Q265,125 262,133" fill="none" stroke="#ff69b4" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <g class="note" style="animation-duration: 4.5s; animation-delay: 3s;">
    <circle cx="550" cy="120" r="5" fill="#a855f7" opacity="0.6"/>
    <line x1="555" y1="120" x2="555" y2="98" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    <path d="M555,98 Q565,93 562,101" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Fireflies -->
  <circle cx="50" cy="100" r="4" fill="url(#firefly)" class="firefly" style="animation-duration: 3s; animation-delay: 0s;"/>
  <circle cx="180" cy="150" r="3" fill="url(#firefly)" class="firefly" style="animation-duration: 2.5s; animation-delay: 0.5s;"/>
  <circle cx="320" cy="80" r="4" fill="url(#firefly)" class="firefly" style="animation-duration: 3.5s; animation-delay: 1s;"/>
  <circle cx="450" cy="120" r="3" fill="url(#firefly)" class="firefly" style="animation-duration: 2.8s; animation-delay: 1.5s;"/>
  <circle cx="580" cy="90" r="4" fill="url(#firefly)" class="firefly" style="animation-duration: 3.2s; animation-delay: 0.3s;"/>
  <circle cx="700" cy="140" r="3" fill="url(#firefly)" class="firefly" style="animation-duration: 2.7s; animation-delay: 2s;"/>
  <circle cx="130" cy="200" r="3" fill="url(#firefly)" class="firefly" style="animation-duration: 3.3s; animation-delay: 0.8s;"/>
  <circle cx="400" cy="180" r="4" fill="url(#firefly)" class="firefly" style="animation-duration: 2.9s; animation-delay: 1.2s;"/>
  
  <!-- Sparkles -->
  <circle cx="100" cy="50" r="3" fill="rgba(168,85,247,0.5)" class="sparkle" style="animation-duration: 5s; animation-delay: 0s;"/>
  <circle cx="300" cy="100" r="4" fill="rgba(255,182,193,0.5)" class="sparkle" style="animation-duration: 6s; animation-delay: 1s;"/>
  <circle cx="500" cy="60" r="3" fill="rgba(168,85,247,0.5)" class="sparkle" style="animation-duration: 4s; animation-delay: 2s;"/>
  <circle cx="700" cy="80" r="5" fill="rgba(255,182,193,0.5)" class="sparkle" style="animation-duration: 7s; animation-delay: 0.5s;"/>
  
  <!-- Lights -->
  <circle cx="150" cy="100" r="2" fill="#ff6b9d" class="light" style="animation-duration: 3s; animation-delay: 0s;"/>
  <circle cx="350" cy="80" r="2" fill="#4ecdc4" class="light" style="animation-duration: 2.5s; animation-delay: 0.5s;"/>
  <circle cx="550" cy="120" r="2" fill="#a855f7" class="light" style="animation-duration: 3.5s; animation-delay: 1s;"/>
  <circle cx="750" cy="90" r="2" fill="#ff6b9d" class="light" style="animation-duration: 2.8s; animation-delay: 1.5s;"/>
  
  <!-- Bubbles -->
  <circle cx="80" cy="250" r="12" fill="url(#bubble)" class="bubble" style="animation-duration: 6s; animation-delay: 0s;"/>
  <circle cx="200" cy="250" r="8" fill="url(#bubble)" class="bubble" style="animation-duration: 8s; animation-delay: 1s;"/>
  <circle cx="350" cy="250" r="15" fill="url(#bubble)" class="bubble" style="animation-duration: 7s; animation-delay: 2s;"/>
  <circle cx="500" cy="250" r="10" fill="url(#bubble)" class="bubble" style="animation-duration: 9s; animation-delay: 0.5s;"/>
  <circle cx="650" cy="250" r="13" fill="url(#bubble)" class="bubble" style="animation-duration: 6.5s; animation-delay: 3s;"/>
  <circle cx="750" cy="250" r="9" fill="url(#bubble)" class="bubble" style="animation-duration: 7.5s; animation-delay: 1.5s;"/>
  
  <!-- Petals -->
  <ellipse cx="120" cy="0" rx="8" ry="12" fill="#ffb6c1" opacity="0.8" class="petal" style="animation-duration: 8s; animation-delay: 0s;" transform="rotate(30, 120, 0)"/>
  <ellipse cx="280" cy="0" rx="10" ry="14" fill="#ff69b4" opacity="0.7" class="petal" style="animation-duration: 10s; animation-delay: 2s;" transform="rotate(-20, 280, 0)"/>
  <ellipse cx="420" cy="0" rx="7" ry="11" fill="#ffc0cb" opacity="0.9" class="petal" style="animation-duration: 9s; animation-delay: 1s;" transform="rotate(45, 420, 0)"/>
  <ellipse cx="580" cy="0" rx="9" ry="13" fill="#ffb6c1" opacity="0.6" class="petal" style="animation-duration: 11s; animation-delay: 3s;" transform="rotate(-35, 580, 0)"/>
  <ellipse cx="720" cy="0" rx="11" ry="15" fill="#ff69b4" opacity="0.8" class="petal" style="animation-duration: 7s; animation-delay: 1.5s;" transform="rotate(25, 720, 0)"/>
</svg>
