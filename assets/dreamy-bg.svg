"""Convert text to SVG path using fonttools."""
from fontTools.ttLib import TTFont
from fontTools.pens.svgPathPen import SVGPathPen

def text_to_svg_path(font_path, text, font_size=100):
    """Convert text to SVG path data with proper positioning."""
    font = TTFont(font_path)
    glyph_set = font.getGlyphSet()
    cmap = font.getBestCmap()
    
    units_per_em = font['head'].unitsPerEm
    
    all_paths = []
    current_x = 0
    
    for char in text:
        if char == ' ':
            current_x += font_size * 0.3
            continue
            
        code_point = ord(char)
        if code_point not in cmap:
            current_x += font_size * 0.5
            continue
            
        glyph_name = cmap[code_point]
        glyph = glyph_set[glyph_name]
        
        # Draw glyph to pen
        pen = SVGPathPen(glyph_set)
        glyph.draw(pen)
        path_data = pen.getCommands()
        
        if path_data:
            # Store path with its x offset (in font units)
            all_paths.append((current_x, path_data))
        
        # Advance by glyph width (in font units)
        current_x += glyph.width
    
    return all_paths, current_x

def create_svg_text_element(paths, total_width, font_size, y_pos, fill_color, glow_color):
    """Create SVG text element with proper scaling and flipping."""
    font_path = r'C:\Windows\Fonts\FRSCRIPT.TTF'
    font = TTFont(font_path)
    units_per_em = font['head'].unitsPerEm
    
    # Scale factor: desired_size / units_per_em
    scale = font_size / units_per_em
    
    # Center the text (x offset to center in 800px viewBox)
    center_offset = (800 - (total_width * scale)) / 2
    
    elements = []
    
    for x_offset, path_data in paths:
        # Calculate final position
        x_pos = center_offset + (x_offset * scale)
        
        # Create path with transform: translate and scale with Y-axis flip
        # scale(1, -1) flips Y axis, then we need to adjust Y position
        element = f'<path d="{path_data}" fill="{fill_color}" transform="translate({x_pos:.1f}, {y_pos + font_size}) scale({scale:.6f}, -{scale:.6f})" style="filter: drop-shadow(0 0 8px {glow_color});"/>'
        elements.append(element)
    
    return '\n    '.join(elements)

def main():
    font_path = r'C:\Windows\Fonts\FRSCRIPT.TTF'
    
    # Text lines
    lines = [
        {
            'text': "*** Hi there, I'm jing1312! ***",
            'size': 28,
            'y': 85,
            'fill': '#ffffff',
            'glow': 'rgba(168,85,247,0.5)'
        },
        {
            'text': "*** Welcome to my magical space ***",
            'size': 16,
            'y': 115,
            'fill': '#ffb6c1',
            'glow': 'rgba(255,182,193,0.5)'
        }
    ]
    
    print("Generating SVG text elements...")
    print()
    
    for i, line in enumerate(lines):
        text = line['text']
        paths, total_width = text_to_svg_path(font_path, text, line['size'])
        
        print(f"Line {i+1}: '{text}'")
        print(f"  Font units width: {total_width:.1f}")
        
        svg_element = create_svg_text_element(
            paths, total_width, line['size'], line['y'], 
            line['fill'], line['glow']
        )
        
        # Save to file
        with open(f'text_line_{i}.txt', 'w', encoding='utf-8') as f:
            f.write(svg_element)
        
        print(f"  Saved to text_line_{i}.txt")
        print()

if __name__ == '__main__':
    main()
